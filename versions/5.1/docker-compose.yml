version: "3.8"

x-env: &default-env
  # Lets Moodle know it's running under the moodle-docker style env
  MOODLE_DOCKER_RUNNING: "1"

services:
  db:
    image: postgres:15.14
    container_name: moodle_db_51
    environment:
      POSTGRES_USER: moodle
      POSTGRES_PASSWORD: m@0dl3ing
      POSTGRES_DB: moodle
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moodle -d moodle"]
      interval: 5s
      timeout: 5s
      retries: 20
    # No ports published — db is only accessible within the Docker network

  web:
    # MoodleHQ's PHP+Apache image compatible with Moodle 5.1 (PHP 8.3 is supported)
    image: moodlehq/moodle-php-apache:8.3-bookworm
    container_name: moodle_web_51
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *default-env
      MOODLE_DOCKER_DBTYPE: pgsql
      MOODLE_DOCKER_DBHOST: db
      MOODLE_DOCKER_DBNAME: moodle
      MOODLE_DOCKER_DBUSER: moodle
      MOODLE_DOCKER_DBPASS: m@0dl3ing

    # Port 80 is handled by Caddy
    expose:
      - "80"
    volumes:
      # Mount Moodle code (must be the 5.1 branch / 5.1.x release)
      - ./moodle:/var/www/html:Z
      # Standard writable dirs (precreated and owned by www-data in the image)
      - moodledata:/var/www/moodledata:Z
      - phpunitdata:/var/www/phpunitdata:Z
      - behatdata:/var/www/behatdata:Z

  caddy:
    image: caddy:2-alpine
    container_name: moodle_proxy_51
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-0.0.0.0}:${WEB_PORT:-8000}:${WEB_PORT:-8000}"
      - "${BIND_ADDRESS:-0.0.0.0}:${EXTRA_PORT_443:-443}:443"
      - "${BIND_ADDRESS:-0.0.0.0}:${EXTRA_PORT_80:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web


volumes:
  dbdata:
  moodledata:
  phpunitdata:
  behatdata:
  caddy_data:
  caddy_config:
